<!DOCTYPE html><html><head></head><body><script src="data.js"></script><script>
const P=new URLSearchParams(location.search),BU=`${location.origin}${location.pathname}`;
function gSVG(e,c,f,sz,sw,bg,rd,op){const en=D[e];if(!en)return`<svg xmlns="http://www.w3.org/2000/svg" width="${sz}" height="${sz}" viewBox="0 0 64 64"><circle cx="32" cy="32" r="28" fill="none" stroke="#${c}" stroke-width="2" stroke-dasharray="4 3"/><line x1="18" y1="18" x2="46" y2="46" stroke="#${c}" stroke-width="2" stroke-linecap="round"/><text x="32" y="58" text-anchor="middle" font-size="7" fill="#${c}" font-family="sans-serif">unsupported</text></svg>`;let b=bg&&bg!=='none'?`<rect width="${sz}" height="${sz}" rx="${rd}" fill="#${bg}"/>`:'';return`<svg xmlns="http://www.w3.org/2000/svg" width="${sz}" height="${sz}" viewBox="0 0 64 64" stroke-linecap="round" stroke-linejoin="round" opacity="${op}">${b}${en.d(`#${c}`,f==='none'?'none':`#${f}`,sw)}</svg>`}
function eo(k,v){return{emoji:k,name:v.n,category:v.c,aliases:v.a,tags:v.t,mood:v.m,description:v.desc,unicode:v.u,group:v.g,subgroup:v.sg,url:`${BU}?emoji=${encodeURIComponent(k)}`}}
const isAPI=P.has('emoji')||P.has('list')||P.has('search')||P.has('category');
if(isAPI){const fmt=(P.get('format')||'svg').toLowerCase(),isL=P.has('list')&&P.get('list')!=='0',sr=(P.get('search')||'').toLowerCase(),cf=P.get('category')||'';
if(isL||sr||cf){let r=Object.entries(D).map(([k,v])=>eo(k,v));if(sr)r=r.filter(x=>x.name.toLowerCase().includes(sr)||x.emoji.includes(sr)||x.category.toLowerCase().includes(sr)||x.aliases.some(a=>a.includes(sr))||x.tags.some(t=>t.includes(sr)));if(cf)r=r.filter(x=>x.category===cf);
if(fmt==='json'){document.open();document.write(JSON.stringify({success:true,count:r.length,emojis:r},null,2));document.close()}else if(fmt==='xml'){let x=`<?xml version="1.0" encoding="UTF-8"?>\n<response success="true" count="${r.length}">\n<emojis>\n`;r.forEach(e=>{x+=`  <emoji>\n    <char>${ex(e.emoji)}</char>\n    <name>${ex(e.name)}</name>\n    <category>${ex(e.category)}</category>\n    <mood>${ex(e.mood)}</mood>\n    <unicode>${ex(e.unicode)}</unicode>\n    <group>${ex(e.group)}</group>\n    <subgroup>${ex(e.subgroup)}</subgroup>\n    <description>${ex(e.description)}</description>\n    <aliases>${e.aliases.map(a=>`<alias>${ex(a)}</alias>`).join('')}</aliases>\n    <tags>${e.tags.map(t=>`<tag>${ex(t)}</tag>`).join('')}</tags>\n    <url>${ex(e.url)}</url>\n  </emoji>\n`});x+=`</emojis>\n</response>`;document.open();document.write(x);document.close()}else{document.open();document.write(JSON.stringify({success:true,count:r.length,emojis:r,note:"Add &format=xml or &format=json"},null,2));document.close()}}else{const em=P.get('emoji'),co=(P.get('color')||'000000').replace('#',''),fi=P.has('fill')?(P.get('fill')||'').replace('#',''):'none',sz=Math.max(1,Math.min(1024,parseInt(P.get('size'))||64)),sw=Math.max(.5,Math.min(10,parseFloat(P.get('stroke'))||2)),bg=P.has('bg')?(P.get('bg')||'').replace('#',''):null,rd=Math.max(0,Math.min(sz/2,parseInt(P.get('radius'))||0)),op=Math.max(0,Math.min(1,parseFloat(P.get('opacity'))||1));const en=D[em],svg=gSVG(em,co,fi,sz,sw,bg,rd,op),url=`${BU}?emoji=${encodeURIComponent(em)}&color=${co}${fi!=='none'?'&fill='+fi:''}${sz!==64?'&size='+sz:''}${sw!==2?'&stroke='+sw:''}${bg?'&bg='+bg+'&radius='+rd:''}${op!==1?'&opacity='+op:''}`;
if(fmt==='json'){const r={success:!!en,emoji:em,name:en?en.n:null,category:en?en.c:null,aliases:en?en.a:[],tags:en?en.t:[],mood:en?en.m:null,description:en?en.desc:null,unicode:en?en.u:null,group:en?en.g:null,subgroup:en?en.sg:null,svg,url,params:{color:co,fill:fi,size:sz,stroke:sw,bg:bg||'none',radius:rd,opacity:op}};if(!en){r.error="Not found. Use ?list=1&format=json";delete r.svg}document.open();document.write(JSON.stringify(r,null,2));document.close()}else if(fmt==='xml'){let x=`<?xml version="1.0" encoding="UTF-8"?>\n<emoji success="${!!en}">\n  <char>${ex(em)}</char>\n  <name>${ex(en?en.n:'')}</name>\n  <category>${ex(en?en.c:'')}</category>\n  <mood>${ex(en?en.m:'')}</mood>\n  <unicode>${ex(en?en.u:'')}</unicode>\n  <group>${ex(en?en.g:'')}</group>\n  <subgroup>${ex(en?en.sg:'')}</subgroup>\n  <description>${ex(en?en.desc:'')}</description>\n  <aliases>${en?en.a.map(a=>`<alias>${ex(a)}</alias>`).join(''):''}</aliases>\n  <tags>${en?en.t.map(t=>`<tag>${ex(t)}</tag>`).join(''):''}</tags>\n  <svg><![CDATA[${svg}]]></svg>\n  <url>${ex(url)}</url>\n  <params><color>${co}</color><fill>${fi}</fill><size>${sz}</size><stroke>${sw}</stroke><bg>${bg||'none'}</bg><radius>${rd}</radius><opacity>${op}</opacity></params>\n</emoji>`;document.open();document.write(x);document.close()}else{document.open();document.write(svg);document.close()}}throw new Error('API')}
</script></body></html>
