<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Custom Emoji API</title><script src="https://cdn.tailwindcss.com"></script><link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&display=swap" rel="stylesheet"><script>tailwind.config={theme:{extend:{fontFamily:{d:['Space Grotesk','sans-serif']},colors:{bg:'#08080a',card:'#111114',sf:'#1a1a1f',bd:'#2a2a32',fg:'#e8e8ed',mt:'#6b6b80',ac:'#e8a030',ad:'#3a2a10'}}}}</script><style>*{margin:0;box-sizing:border-box}body{font-family:'Space Grotesk',sans-serif;background:#08080a;color:#e8e8ed}::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#2a2a32;border-radius:3px}.eb{transition:.15s;cursor:pointer;border:2px solid transparent;border-radius:6px;padding:4px;display:flex;align-items:center;justify-content:center;background:#1a1a1f}.eb:hover{border-color:#e8a030;transform:scale(1.1)}.eb.on{border-color:#e8a030;background:#3a2a10}.bl{background:#0c0c10;border:1px solid #2a2a32;border-radius:6px;padding:12px;font-family:monospace;font-size:11.5px;color:#b0b0c0;overflow-x:auto;position:relative;white-space:pre-wrap;word-break:break-all;line-height:1.6}.cb{position:absolute;top:6px;right:6px;background:#1a1a1f;border:1px solid #2a2a32;color:#6b6b80;padding:2px 8px;border-radius:5px;font-size:10px;cursor:pointer;font-family:inherit}.cb:hover{color:#e8e8ed}.cb.ok{background:#1a3a1a;color:#60d060;border-color:#2a5a2a}.pa{background:repeating-conic-gradient(#1a1a1f 0% 25%,#111114 0% 50%) 50%/16px 16px;border:1px solid #2a2a32;border-radius:10px;display:flex;align-items:center;justify-content:center;min-height:180px}.tst{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a3a1a;color:#60d060;border:1px solid #2a5a2a;padding:8px 20px;border-radius:8px;font-size:13px;z-index:99;transition:.25s;pointer-events:none}.tst.on{transform:translateX(-50%) translateY(0)}.tb{padding:6px 16px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:.2s;border:1px solid transparent;background:transparent;color:#6b6b80}.tb:hover{color:#e8e8ed;background:#1a1a1f}.tb.on{color:#e8a030;background:#3a2a10;border-color:#e8a03040}@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}.fl{animation:fl 4s ease-in-out infinite}</style></head><body><div id="app"></div><div id="tst" class="tst"></div><script src="data.js"></script><script>
const BU=location.pathname.replace('index.html','')+'emojisvg.html';
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),1500)}
function cpy(b,t){navigator.clipboard.writeText(t).then(()=>{b.textContent='Copied!';b.classList.add('ok');setTimeout(()=>{b.textContent='Copy';b.classList.remove('ok')},1200)})}
function cpyE(b,id){const el=document.getElementById(id);cpy(b,el.textContent.replace('Copy','').replace('Copied!','').trim())}
let S={emoji:'😀',color:'e8a030',fill:'none',bg:null,size:64,stroke:2,radius:0,opacity:1};
function bURL(){let u=BU+'?emoji='+encodeURIComponent(S.emoji)+'&color='+S.color;if(S.fill!=='none')u+='&fill='+S.fill;if(S.size!==64)u+='&size='+S.size;if(S.stroke!==2)u+='&stroke='+S.stroke;if(S.bg)u+='&bg='+S.bg+'&radius='+S.radius;if(S.opacity!==1)u+='&opacity='+S.opacity;return u}
function upP(){const pv=document.getElementById('pv'),url=bURL();if(pv){const en=D[S.emoji];if(en){const svg=en.d('#'+S.color,S.fill==='none'?'none':'#'+S.fill,S.stroke);pv.innerHTML='<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 64 64" stroke-linecap="round" stroke-linejoin="round"'+(S.bg?' style="background:#'+S.bg+';border-radius:'+Math.min(S.radius,80)+'px"':'')+'>'+svg+'</svg>'}}['ou','oj','ox'].forEach((id,i)=>{const el=document.getElementById(id);if(!el)return;const b=el.querySelector('.cb');const u=i===0?url:i===1?url+'&format=json':url+'&format=xml';el.textContent=u;el.prepend(b)})}

function init(){
const grid=document.getElementById('eg');
Object.entries(D).forEach(([k,v])=>{const btn=document.createElement('button');btn.className='eb'+(k===S.emoji?' on':'');btn.title=v.n;btn.innerHTML='<svg viewBox="0 0 64 64" width="26" height="26" stroke-linecap="round" stroke-linejoin="round">'+v.d('#e8e8ed','none',2)+'</svg>';btn.onclick=()=>{grid.querySelectorAll('.eb').forEach(b=>b.classList.remove('on'));btn.classList.add('on');S.emoji=k;upP()};grid.appendChild(btn)});
const sr=document.getElementById('sr');if(sr)sr.oninput=e=>{const q=e.target.value.toLowerCase();grid.querySelectorAll('.eb').forEach((b,i)=>{const k=Object.keys(D)[i],v=D[k];b.style.display=(!q||v.n.toLowerCase().includes(q)||k.includes(q)||v.c.toLowerCase().includes(q))?'':'none'})};
document.getElementById('cCo').oninput=e=>{S.color=e.target.value.replace('#','');document.getElementById('cColorH').textContent=S.color;upP()};
document.getElementById('cFi').oninput=e=>{if(!document.getElementById('cNF').checked)S.fill=e.target.value.replace('#','');upP()};
document.getElementById('cBg').oninput=e=>{if(!document.getElementById('cNB').checked)S.bg=e.target.value.replace('#','');upP()};
['cOp:cOpV','cSz:cSzV','cSw:cSwV','cRd:cRdV'].forEach(p=>{const[id,vid]=p.split(':');document.getElementById(id).oninput=e=>{const v=e.target.value;switch(id){case'cOp':S.opacity=+v;break;case'cSz':S.size=+v;break;case'cSw':S.stroke=+v;break;case'cRd':S.radius=+v;break}document.getElementById(vid).textContent=v;upP()}});
document.getElementById('cNF').onchange=e=>{S.fill=e.target.checked?'none':document.getElementById('cFi').value.replace('#','');upP()};
document.getElementById('cNB').onchange=e=>{S.bg=e.target.checked?null:document.getElementById('cBg').value.replace('#','');upP()};
upP();
const gl=document.getElementById('gl');if(gl)Object.entries(D).forEach(([k,v])=>{const d=document.createElement('div');d.className='bg-card border border-bd rounded-xl p-2 flex flex-col items-center gap-1 hover:border-accent/40 transition-colors cursor-pointer';d.innerHTML='<svg viewBox="0 0 64 64" width="32" height="32" stroke-linecap="round" stroke-linejoin="round">'+v.d('#e8e8ed','none',2)+'</svg><span class="text-[9px] text-mt text-center leading-tight">'+v.n+'</span>';d.onclick=()=>cpy(d,BU+'?emoji='+encodeURIComponent(k)+'&color=e8e8ed');gl.appendChild(d)});
window.stab=(t,btn)=>{document.querySelectorAll('.tc').forEach(e=>e.classList.add('hidden'));document.getElementById('t-'+t).classList.remove('hidden');document.querySelectorAll('.tb').forEach(b=>b.classList.remove('on'));btn.classList.add('on')};
}

const cats={};Object.values(D).forEach(v=>{cats[v.c]=(cats[v.c]||0)+1});
const cnt=Object.keys(D).length;
document.getElementById('app').innerHTML='<nav class="fixed top-0 left-0 right-0 z-50 backdrop-blur-xl bg-bg/80 border-b border-bd"><div class="max-w-5xl mx-auto px-5 h-12 flex items-center justify-between"><div class="flex items-center gap-2"><div class="w-6 h-6 rounded bg-ad flex items-center justify-center"><i class="fa-solid fa-face-smile text-accent text-[10px]"></i></div><span class="font-bold text-sm">Emoji API</span><span class="text-[9px] font-semibold text-accent bg-ad px-1.5 py-0.5 rounded-full">v2</span></div><div class="hidden sm:flex gap-4 text-xs text-mt"><a href="#pg" class="hover:text-fg">Playground</a><a href="#ep" class="hover:text-fg">Endpoints</a><a href="#gl" class="hover:text-fg">Gallery</a></div></div></nav><header class="pt-28 pb-14 px-5 text-center"><div class="max-w-2xl mx-auto"><p class="text-xs text-mt bg-sf border border-bd rounded-full inline-block px-3 py-1 mb-6">SVG + JSON + XML &middot; '+cnt+' Emojis &middot; No API Key</p><h1 class="text-5xl sm:text-6xl font-extrabold tracking-tight mb-4">Custom Themed <span class="text-accent">Outlined Emojis</span></h1><p class="text-mt mb-8 max-w-lg mx-auto">Outlined SVG emojis with custom colors. Fetch as SVG, JSON, or XML from a URL.</p><div class="flex flex-col sm:flex-row gap-2 max-w-xl mx-auto"><div class="bl text-left text-xs flex-1"><button class="cb" onclick="cpy(this,\''+BU+'?color=e8a030&emoji=%F0%9F%98%80\')">Copy</button>&lt;img src="'+BU+'?emoji=😀&color=e8a030" /&gt;</div><div class="bl text-left text-xs flex-1"><button class="cb" onclick="cpy(this,\''+BU+'?emoji=%F0%9F%94%A5&format=json\')">Copy</button>'+BU+'?emoji=🔥&format=json</div></div><div class="mt-8 flex justify-center"><div class="fl" id="hero" style="width:72px;height:72px"></div></div></div></header><section id="pg" class="py-16 px-5"><div class="max-w-5xl mx-auto"><h2 class="text-2xl font-bold mb-6 text-center">Live Playground</h2><div class="grid lg:grid-cols-5 gap-5"><div class="lg:col-span-3 space-y-4"><div class="bg-card border border-bd rounded-2xl p-4"><div class="flex items-center justify-between mb-2"><label class="text-[10px] font-semibold text-mt uppercase tracking-wider">Select Emoji</label><input type="text" id="sr" placeholder="Search..." class="bg-sf border border-bd rounded-lg px-2.5 py-1 text-xs text-fg w-28 focus:outline-none focus:border-accent"></div><div id="eg" class="grid grid-cols-8 sm:grid-cols-10 gap-1 max-h-48 overflow-y-auto pr-1"></div></div><div class="grid grid-cols-2 sm:grid-cols-4 gap-3"><div class="bg-card border border-bd rounded-xl p-3"><label class="text-[10px] font-semibold text-mt uppercase tracking-wider block mb-1">Stroke</label><input type="color" id="cCo" value="#e8a030" class="w-full h-8 border border-bd rounded-lg bg-sf cursor-pointer p-0.5"><div class="text-[10px] text-mt mt-1 font-mono" id="cColorH">e8a030</div></div><div class="bg-card border border-bd rounded-xl p-3"><label class="text-[10px] font-semibold text-mt uppercase tracking-wider block mb-1">Fill</label><input type="color" id="cFi" value="#000000" class="w-full h-8 border border-bd rounded-lg bg-sf cursor-pointer p-0.5"><label class="text-[10px] text-mt flex items-center gap-1 cursor-pointer mt-1"><input type="checkbox" id="cNF" checked class="accent-accent"> None</label></div><div class="bg-card border border-bd rounded-xl p-3"><label class="text-[10px] font-semibold text-mt uppercase tracking-wider block mb-1">Background</label><input type="color" id="cBg" value="#1a1a1f" class="w-full h-8 border border-bd rounded-lg bg-sf cursor-pointer p-0.5"><label class="text-[10px] text-mt flex items-center gap-1 cursor-pointer mt-1"><input type="checkbox" id="cNB" checked class="accent-accent"> None</label></div><div class="bg-card border border-bd rounded-xl p-3"><label class="text-[10px] font-semibold text-mt uppercase tracking-wider block mb-1">Opacity</label><div class="flex items-center gap-1"><input type="range" id="cOp" min="0.1" max="1" step="0.05" value="1" class="flex-1 accent-accent"><span class="text-[11px] text-accent font-semibold w-6 text-right" id="cOpV">1</span></div></div></div><div class="grid grid-cols-3 gap-3"><div class="bg-card border border-bd rounded-xl p-3"><label class="text-[10px] font-semibold text-mt uppercase tracking-wider block mb-1">Size</label><div class="flex items-center gap-1"><input type="range" id="cSz" min="16" max="256" step="8" value="64" class="flex-1 accent-accent"><span class="text-[11px] text-accent font-semibold w-6 text-right" id="cSzV">64</span></div></div><div class="bg-card border border-bd rounded-xl p-3"><label class="text-[10px] font-semibold text-mt uppercase tracking-wider block mb-1">Stroke W</label><div class="flex items-center gap-1"><input type="range" id="cSw" min="0.5" max="6" step="0.25" value="2" class="flex-1 accent-accent"><span class="text-[11px] text-accent font-semibold w-6 text-right" id="cSwV">2</span></div></div><div class="bg-card border border-bd rounded-xl p-3"><label class="text-[10px] font-semibold text-mt uppercase tracking-wider block mb-1">Radius</label><div class="flex items-center gap-1"><input type="range" id="cRd" min="0" max="128" step="4" value="0" class="flex-1 accent-accent"><span class="text-[11px] text-accent font-semibold w-6 text-right" id="cRdV">0</span></div></div></div></div><div class="lg:col-span-2 space-y-4"><div class="pa"><div id="pv"></div></div><div class="bg-card border border-bd rounded-2xl p-4 space-y-3"><div><label class="text-[10px] font-semibold text-mt uppercase tracking-wider block mb-1">SVG URL</label><div class="bl text-[11px]" id="ou"><button class="cb" onclick="cpyE(this,'ou')">Copy</button></div></div><div><label class="text-[10px] font-semibold text-mt uppercase tracking-wider block mb-1">JSON URL</label><div class="bl text-[11px]" id="oj"><button class="cb" onclick="cpyE(this,'oj')">Copy</button></div></div><div><label class="text-[10px] font-semibold text-mt uppercase tracking-wider block mb-1">XML URL</label><div class="bl text-[11px]" id="ox"><button class="cb" onclick="cpyE(this,'ox')">Copy</button></div></div><button onclick="(()=>{const a=document.createElement(\'a\');a.href=bURL();a.download=\'emoji.svg\';a.click();toast(\'Downloaded\')})()" class="w-full py-2 bg-accent text-bg font-semibold text-xs rounded-xl hover:brightness-110 transition flex items-center justify-center gap-2"><i class="fa-solid fa-download text-[10px]"></i> Download SVG</button></div></div></div></div></section><section id="ep" class="py-16 px-5"><div class="max-w-4xl mx-auto"><h2 class="text-2xl font-bold mb-6 text-center">Endpoints</h2><div class="flex gap-2 mb-5 justify-center flex-wrap"><button class="tb on" onclick="stab(\'svg\',this)">SVG</button><button class="tb" onclick="stab(\'json\',this)">JSON</button><button class="tb" onclick="stab(\'xml\',this)">XML</button><button class="tb" onclick="stab(\'list\',this)">List / Search</button></div><div id="t-svg" class="tc"><div class="bg-card border border-bd rounded-2xl p-5"><h3 class="text-lg font-bold text-accent mb-2">Single Emoji SVG</h3><p class="text-mt text-sm mb-3">Raw SVG. Use in img tags or CSS backgrounds.</p><div class="bl text-xs mb-3">GET ?emoji=😀&color=e8a030&size=128</div><div class="bl text-xs">&lt;img src="'+BU+'?emoji=🔥&color=ff4400&size=96" alt="fire" /&gt;</div></div></div><div id="t-json" class="tc hidden"><div class="bg-card border border-bd rounded-2xl p-5"><h3 class="text-lg font-bold text-accent mb-2">Single Emoji JSON</h3><p class="text-mt text-sm mb-3">JSON with svg string, metadata, all params.</p><div class="bl text-xs mb-3">GET ?emoji=😀&color=e8a030&format=json</div><div class="bl text-xs">{ "success": true, "emoji": "😀", "name": "Grinning", "category": "Faces", "mood": "positive", "description": "A grinning face...", "unicode": "U+1F600", "group": "Smileys & Emotion", "aliases": ["grin","smile wide"], "tags": ["happy","smile","grin","positive"], "svg": "&lt;svg...", "url": "...", "params": { "color": "e8a030", "fill": "none", "size": 64, "stroke": 2, "opacity": 1 } }</div></div></div><div id="t-xml" class="tc hidden"><div class="bg-card border border-bd rounded-2xl p-5"><h3 class="text-lg font-bold text-accent mb-2">Single Emoji XML</h3><p class="text-mt text-sm mb-3">XML with SVG in CDATA, all metadata as child elements.</p><div class="bl text-xs mb-3">GET ?emoji=😀&color=e8a030&format=xml</div><div class="bl text-xs">&lt;?xml version="1.0"?&gt;\n&lt;emoji success="true"&gt;\n  &lt;char&gt;😀&lt;/char&gt;\n  &lt;name&gt;Grinning&lt;/name&gt;\n  &lt;category&gt;Faces&lt;/category&gt;\n  &lt;mood&gt;positive&lt;/mood&gt;\n  &lt;description&gt;A grinning face...&lt;/description&gt;\n  &lt;aliases&gt;&lt;alias&gt;grin&lt;/alias&gt;...&lt;/aliases&gt;\n  &lt;tags&gt;&lt;tag&gt;happy&lt;/tag&gt;...&lt;/tags&gt;\n  &lt;svg&gt;&lt;![CDATA[&lt;svg...]]&gt;&lt;/svg&gt;\n  &lt;url&gt;...&lt;/url&gt;\n&lt;/emoji&gt;</div></div></div><div id="t-list" class="tc hidden"><div class="space-y-4"><div class="bg-card border border-bd rounded-2xl p-5"><h3 class="text-lg font-bold text-accent mb-2">List All</h3><p class="text-mt text-sm mb-3">Metadata for every emoji, no SVG generated.</p><div class="bl text-xs">GET ?list=1&format=json</div></div><div class="bg-card border border-bd rounded-2xl p-5"><h3 class="text-lg font-bold text-accent mb-2">Search</h3><p class="text-mt text-sm mb-3">Filter by name, character, category, aliases, tags.</p><div class="bl text-xs mb-2">GET ?search=fire&format=json</div><div class="bl text-xs mb-2">GET ?search=star&category=Symbols&format=xml</div><div class="bl text-xs">GET ?category=Faces&format=json</div></div></div></div><h3 class="text-lg font-bold mt-8 mb-3">Parameters</h3><div class="bg-card border border-bd rounded-2xl overflow-x-auto"><table class="w-full min-w-[500px] text-xs"><thead><tr class="border-b border-bd"><th class="text-left p-3 text-accent font-semibold">Param</th><th class="text-left p-3 text-accent font-semibold">Type</th><th class="text-left p-3 text-accent font-semibold">Default</th><th class="text-left p-3 text-accent font-semibold">Description</th></tr></thead><tbody><tr class="border-b border-bd/50"><td class="p-3"><code class="text-accent">emoji</code></td><td class="p-3 text-mt">string</td><td class="p-3 text-mt">—</td><td class="p-3">Emoji character</td></tr><tr class="border-b border-bd/50"><td class="p-3"><code class="text-accent">format</code></td><td class="p-3 text-mt">string</td><td class="p-3 text-mt">svg</td><td class="p-3">svg, json, or xml</td></tr><tr class="border-b border-bd/50"><td class="p-3"><code class="text-accent">color</code></td><td class="p-3 text-mt">hex</td><td class="p-3 text-mt">000000</td><td class="p-3">Stroke color (no #)</td></tr><tr class="border-b border-bd/50"><td class="p-3"><code class="text-accent">fill</code></td><td class="p-3 text-mt">hex</td><td class="p-3 text-mt">none</td><td class="p-3">Fill color (no #)</td></tr><tr class="border-b border-bd/50"><td class="p-3"><code class="text-accent">size</code></td><td class="p-3 text-mt">number</td><td class="p-3 text-mt">64</td><td class="p-3">Px dimensions (1-1024)</td></tr><tr class="border-b border-bd/50"><td class="p-3"><code class="text-accent">stroke</code></td><td class="p-3 text-mt">number</td><td class="p-3 text-mt">2</td><td class="p-3">Stroke width (0.5-10)</td></tr><tr class="border-b border-bd/50"><td class="p-3"><code class="text-accent">bg</code></td><td class="p-3 text-mt">hex</td><td class="p-3 text-mt">none</td><td class="p-3">Background color</td></tr><tr class="border-b border-bd/50"><td class="p-3"><code class="text-accent">radius</code></td><td class="p-3 text-mt">number</td><td class="p-3 text-mt">0</td><td class="p-3">Background corner radius</td></tr><tr class="border-b border-bd/50"><td class="p-3"><code class="text-accent">opacity</code></td><td class="p-3 text-mt">number</td><td class="p-3 text-mt">1</td><td class="p-3">Opacity (0.1-1)</td></tr><tr class="border-b border-bd/50"><td class="p-3"><code class="text-accent">list</code></td><td class="p-3 text-mt">flag</td><td class="p-3 text-mt">—</td><td class="p-3">Set to 1 to list all</td></tr><tr><td class="p-3"><code class="text-accent">search</code></td><td class="p-3 text-mt">string</td><td class="p-3 text-mt">—</td><td class="p-3">Search by name/tag/alias</td></tr><tr><td class="p-3"><code class="text-accent">category</code></td><td class="p-3 text-mt">string</td><td class="p-3 text-mt">—</td><td class="p-3">Filter by exact category</td></tr></tbody></table></div></div></section><section id="gl" class="py-16 px-5"><div class="max-w-5xl mx-auto"><h2 class="text-2xl font-bold mb-2 text-center">All '+cnt+' Emojis</h2><p class="text-mt text-sm text-center mb-6">Click to copy URL</p><div id="gl" class="grid grid-cols-4 sm:grid-cols-6 md:grid-cols-8 lg:grid-cols-10 gap-2"></div></div></section><footer class="py-10 px-5 border-t border-bd text-center"><p class="text-xs text-mt/60">Custom Emoji API — SVG + JSON + XML — Free, no key required</p></footer>';
const h=document.getElementById('hero');if(h&&D['😀'])h.innerHTML='<svg xmlns="http://www.w3.org/2000/svg" width="72" height="72" viewBox="0 0 64 64" stroke-linecap="round" stroke-linejoin="round">'+D['😀'].d('#e8a030','none',2)+'</svg>';
document.addEventListener('click',e=>{const a=e.target.closest('a[href^="#"]');if(a){e.preventDefault();const t=document.querySelector(a.getAttribute('href'));if(t)t.scrollIntoView({behavior:'smooth'})}});
init();
</script></body></html>
